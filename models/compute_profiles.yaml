description: Per-tier model configuration profiles
version: 1.0.0

# Tier is derived from CUDA VRAM in current_system.yaml:
#   cpu_only : no CUDA GPU
#   low      : 0-6 GB  (e.g. RTX 3060 6GB — original dev hardware)
#   medium   : 6-10 GB (e.g. RTX 5070 Laptop 8GB — current system)
#   high     : 10+ GB  (e.g. RTX 3090 24GB)

profiles:
  cpu_only:
    hf_batch_size: 4
    aya23:
      n_gpu_layers: 0
      n_ctx: 4096
      n_batch: 128
      quant: Q4_K_M
    ayaExpanse8b:
      n_gpu_layers: 0
      n_ctx: 4096
      n_batch: 128
      quant: Q4_K_M
    euroLLM9b:
      n_gpu_layers: 0
      n_ctx: 4096
      n_batch: 128
      quant: Q4_K_M

  low:
    hf_batch_size: 8
    aya23:
      n_gpu_layers: -1
      n_ctx: 8192
      n_batch: 256
      quant: Q4_K_M
    ayaExpanse8b:
      n_gpu_layers: -1
      n_ctx: 8192
      n_batch: 256
      quant: Q4_K_M
    euroLLM9b:
      n_gpu_layers: -1
      n_ctx: 8192
      n_batch: 256
      quant: Q4_K_M

  medium:
    hf_batch_size: 16
    aya23:
      n_gpu_layers: -1
      n_ctx: 16384
      n_batch: 512
      quant: Q4_K_M
    ayaExpanse8b:
      n_gpu_layers: -1
      n_ctx: 16384
      n_batch: 512
      quant: Q5_K_M
    euroLLM9b:
      n_gpu_layers: -1
      n_ctx: 4096
      n_batch: 512
      quant: Q5_K_M
    # euroLLM22b omitted: Q4_K_M=13.7GB, does not fit in 8GB VRAM

  high:
    hf_batch_size: 32
    aya23:
      n_gpu_layers: -1
      n_ctx: 32768
      n_batch: 512
      quant: Q4_K_M
    ayaExpanse8b:
      n_gpu_layers: -1
      n_ctx: 32768
      n_batch: 512
      quant: Q5_K_M
    euroLLM9b:
      n_gpu_layers: -1
      n_ctx: 32768
      n_batch: 512
      quant: Q5_K_M
    euroLLM22b:
      n_gpu_layers: -1
      n_ctx: 16384
      n_batch: 512
      quant: Q4_K_M
